services:
  # PHP Application (Laravel Core)
  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-php-app:latest
    restart: unless-stopped
    volumes:
      - ../my-app:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel-network
    container_name: php_myapp

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ../my-app:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - laravel-network
    container_name: nginx_myapp

  # MySQL Database
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: laravel
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - laravel-network
    container_name: mysql_myapp

  # Redis Cache / Session / Queue Store
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - laravel-network
    container_name: redis_myapp

  # Node.js for Vite and Frontend Assets (Vue, TailWind, etc.)
  node:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../my-app:/var/www/html
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - php
    networks:
      - laravel-network
    container_name: node_myapp

  # Mailpit for local email testing
  # mailpit:
  #   image: axllent/mailpit
  #   restart: unless-stopped
  #   ports:
  #     - "1025:1025" # SMTP Port
  #     - "8025:8025" # Webmail UI Port
  #   networks:
  #     - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  db_data:
  redis_data:
